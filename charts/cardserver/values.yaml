            type: HTTP
            path: /actuator/health/readiness
            port: 9082
            spec:
              initialDelaySeconds: 10
              timeoutSeconds: 5
              periodSeconds: 10
              failureThreshold: 3
          startup:
            enabled: true
            port: 9082
            spec:
              initialDelaySeconds: 10
              timeoutSeconds: 5
              periodSeconds: 3
              failureThreshold: 10
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 2
            memory: 512Mi
          requests:
            cpu: 1
            memory: 512Mi
        env:
          SPRING_PROFILES_ACTIVE: production
