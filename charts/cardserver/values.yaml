service:
  aiplayer:
    controller: aiplayer
    ports:
      management:
        port: 9084
  gameengine:
    controller: gameengine
    ports:
      management:
        port: 9083
  admin:
    controller: admin
    ports:
      http:
        port: 8085
      management:
        port: 9085
  api:
    controller: api
    ports:
      http:
        port: 8080
      management:
        port: 9080
  stream:
    controller: stream
    ports:
      http:
        port: 8082
      management:
        port: 9082
ingress:
  mainingress:
    className: nginx-external
    annotations:
      external-dns.alpha.kubernetes.io/target: jasmine.odee.net
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
      cert-manager.io/cluster-issuer: letsencrypt-production
      gethomepage.dev/enabled: "true"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    hosts:
      - host: api.klaversjassen.nl
        paths:
          - path: /
            service:
              identifier: api
              port: http
      - host: stream.klaversjassen.nl
        paths:
          - path: /
            service:
              identifier: stream
              port: http
      - host: admin.klaversjassen.nl
        paths:
          - path: /
            service:
              identifier: admin
              port: http
    tls:
      - secretName: api.klaversjassen.nl
        hosts:
          - api.klaversjassen.nl
      - secretName: stream.klaversjassen.nl
        hosts:
          - stream.klaversjassen.nl
      - secretName: admin.klaversjassen.nl
        hosts:
          - admin.klaversjassen.nl

