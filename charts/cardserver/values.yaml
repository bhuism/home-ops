controllers:
  api:
    replicas: 3
    # annotations:
    #   management.port: "9080"
    revisionHistoryLimit: 1
    strategy: RollingUpdate
    rollingUpdate:
      unavailable: 0
    containers:
      api:
        image:
          repository: ghcr.io/bhuism/api
          tag: "latest"
          pullPolicy: Always
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /actuator/health/liveness
            port: 9080
            spec:
              initialDelaySeconds: 10
              timeoutSeconds: 5
              periodSeconds: 10
              failureThreshold: 3
          readiness:
            enabled: true
            type: HTTP
            path: /actuator/health/readiness
            port: 9080
            spec:
              initialDelaySeconds: 10
              timeoutSeconds: 5
              periodSeconds: 10
              failureThreshold: 3
          startup:
            enabled: true
            port: 9080
            spec:
              initialDelaySeconds: 10
              timeoutSeconds: 5
              periodSeconds: 3
              failureThreshold: 10
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 2
            memory: 512Mi
          requests:
            cpu: 1
            memory: 512Mi
        env:
          SPRING_PROFILES_ACTIVE: production
          CARDSERVER_AUTH_JWT_ES512_SECRET:
            valueFrom:
              secretKeyRef:
                name: jwtsecret
                key: jwtes512secretvalue
  stream:
    replicas: 3
    revisionHistoryLimit: 1
    strategy: RollingUpdate
    rollingUpdate:
      unavailable: 0
    containers:
      stream:
        image:
          repository: ghcr.io/bhuism/stream
          tag: "latest"
          pullPolicy: Always
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /actuator/health/liveness
            port: 9082
            spec:
              initialDelaySeconds: 10
              timeoutSeconds: 5
              periodSeconds: 10
              failureThreshold: 3
          readiness:
